<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
	<title id="title">TalkType social preview</title>
	<desc id="desc">TalkType voice-to-text app preview with the pink ghost mascot.</desc>
	<defs>
		<linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#fffaf0" />
			<stop offset="0.52" stop-color="#fff6e6" />
			<stop offset="1" stop-color="#fff0f7" />
		</linearGradient>
		<linearGradient id="ghostFill" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#ff4fb0" />
			<stop offset="0.58" stop-color="#ff8a7c" />
			<stop offset="1" stop-color="#ffd94a" />
		</linearGradient>
		<filter id="ghostGlow" x="-25%" y="-25%" width="150%" height="150%">
			<feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#f472b6" flood-opacity="0.28" />
			<feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#67e8f9" flood-opacity="0.18" />
		</filter>
		<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#111827" flood-opacity="0.11" />
		</filter>
	</defs>


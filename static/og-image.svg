	<g transform="translate(78 116)">
		<text x="0" y="0" font-family="Arial Black, Arial, sans-serif" font-size="92" font-weight="900" fill="#050505" letter-spacing="-4">
			TalkType<tspan fill="#f472b6" font-size="58">.app</tspan>
		</text>
		<text x="4" y="74" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#374151" letter-spacing="-0.5">
			Voice-to-text that doesn't suck.
		</text>
		<text x="4" y="126" font-family="Arial, sans-serif" font-size="28" font-weight="500" fill="#4b5563">
			Fast live transcription, private offline mode,
		</text>
		<text x="4" y="165" font-family="Arial, sans-serif" font-size="28" font-weight="500" fill="#4b5563">
			and editable text in one tiny ghost app.
		</text>

		<g transform="translate(4 228)" filter="url(#softShadow)">
			<rect x="0" y="0" width="212" height="58" rx="29" fill="#ffd23f" />
			<text x="106" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">always free</text>
		</g>
		<g transform="translate(236 228)" filter="url(#softShadow)">
			<rect x="0" y="0" width="238" height="58" rx="29" fill="#f9a8d4" />
			<text x="119" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">live captions</text>
		</g>
		<g transform="translate(494 228)" filter="url(#softShadow)">
			<rect x="0" y="0" width="212" height="58" rx="29" fill="#99f6e4" />
			<text x="106" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#111827">offline mode</text>
		</g>
	</g>


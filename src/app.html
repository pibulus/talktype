<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<!-- Performance optimizations -->
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
		<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

		<!-- Favicons -->
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/favicon/favicon-32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="%sveltekit.assets%/favicon/favicon-16x16.png"
		/>
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon/favicon.ico" />

		<!-- Ghost component now handles SVG rendering directly -->

		<!-- Apple touch icons -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/appicon/web/apple-touch-icon.png" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/appicon/ios/AppIcon@3x.png"
		/>
		<link
			rel="apple-touch-icon"
			sizes="167x167"
			href="%sveltekit.assets%/appicon/ios/AppIcon-83.5@2x~ipad.png"
		/>
		<link
			rel="apple-touch-icon"
			sizes="152x152"
			href="%sveltekit.assets%/appicon/ios/AppIcon@2x~ipad.png"
		/>

		<!-- Safari Pinned Tab Icon -->
		<link rel="mask-icon" href="%sveltekit.assets%/talktype-icon.svg" color="#f472b6" />

		<!-- Windows / IE -->
		<meta name="msapplication-TileColor" content="#FFF6E6" />
		<meta name="msapplication-TileImage" content="%sveltekit.assets%/appicon/web/icon-192.png" />

		<!-- App configuration -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="format-detection" content="telephone=no" />
		<meta name="application-name" content="TalkType" />
		<meta name="author" content="Pablo Alvarado" />

		<!-- Manifest -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- PWA related meta tags -->
		<meta name="theme-color" content="#FFF6E6" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="TalkType" />

		<!-- iOS specific splash screens - only most common sizes to reduce initial load -->
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/splash/apple-splash-1170-2532.png"
			media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/splash/apple-splash-1125-2436.png"
			media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
		/>

		<style>
			/* Critical styles to prevent black flash */
			body {
				background: linear-gradient(135deg, #fff8f0 0%, #fff6e6 100%);
				margin: 0;
				padding: 0;
				min-height: 100vh;
			}
			[data-theme='mint'] body {
				background: linear-gradient(135deg, #e8fff8 0%, #defff5 100%);
			}
			[data-theme='bubblegum'] body {
				background: linear-gradient(135deg, #fff0f8 0%, #ffe8f5 100%);
			}
			[data-theme='rainbow'] body {
				background: linear-gradient(135deg, #fff5fa 0%, #f5faff 50%, #fffaf5 100%);
			}
		</style>
		<script>
			// Minimal critical theme setup to prevent FOUC
			// This runs synchronously but is optimized for speed
			(function () {
				const t = localStorage.getItem('talktype-vibe') || 'peach';
				document.documentElement.setAttribute('data-theme', t);
				window.__theme = t; // Store for later use
			})();

			// Global error handler for unhandled promise rejections
			window.addEventListener('unhandledrejection', function (event) {
				// Log the error but don't crash the app
				console.warn('[Global Error Handler] Unhandled promise rejection:', event.reason);

				// Check if it's the specific Chrome extension error
				if (
					event.reason &&
					event.reason.message &&
					event.reason.message.includes('message channel closed')
				) {
					// This is likely a Chrome extension interfering, ignore it
					console.log('[Global Error Handler] Ignoring Chrome extension message channel error');
					event.preventDefault();
					return;
				}

				// For other errors, log them but prevent default crash behavior
				event.preventDefault();
			});
		</script>

		<!-- Umami Analytics -->
		<script
			defer
			src="https://cloud.umami.is/script.js"
			data-website-id="280ec8ac-9eb5-4d06-89fe-369960e40b5d"
		></script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
